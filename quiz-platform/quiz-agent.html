<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <style>
    :root {
      --primary : #0078d4;
      --success : #107c10;
      --warn    : #d83b01;
      --bg      : #f3f2f1;
      --card    : #ffffff;
      --border  : #e1dfdd;
      --text    : #201f1e;
      --muted   : #605e5c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    /* ── Card ── */
    #agent-root {
      max-width: 820px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
    }

    /* ── Agent header ── */
    .agent-hdr {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .agent-hdr h2 { font-size: 22px; color: var(--primary); }

    /* ── Forms / inputs ── */
    .form-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    input[type="text"], select, textarea {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 13px;
      background: #fff;
      outline: none;
      width: 100%;
    }
    input[type="text"]:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(0,120,212,.12);
    }
    textarea { resize: vertical; }

    /* ── Buttons ── */
    button {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { filter: brightness(.92); }
    button:disabled { opacity: .55; cursor: default; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Quiz question blocks ── */
    .q-block {
      margin-bottom: 18px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #faf9f8;
    }
    .q-num  { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
    .q-text { font-size: 15px; font-weight: 600; margin-bottom: 12px; line-height: 1.4; }

    /* ── Radio options ── */
    .radio-lbl {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 6px;
      background: #fff;
      font-size: 14px;
      transition: background .12s;
    }
    .radio-lbl:hover  { background: #eff6fc; border-color: var(--primary); }
    .radio-lbl input  { margin-top: 2px; flex-shrink: 0; accent-color: var(--primary); }
    .radio-lbl span   { line-height: 1.4; }

    /* ── Result card ── */
    .result-card {
      text-align: center;
      padding: 24px 20px;
      border-radius: 10px;
      margin: 18px 0;
    }
    .result-pass    { background: #dff6dd; border: 2px solid #92c353; }
    .result-fail    { background: #fde7e9; border: 2px solid #f4b8bf; }
    .result-status  { font-size: 22px; font-weight: 700; }
    .result-pass .result-status { color: var(--success); }
    .result-fail .result-status { color: var(--warn); }
    .result-score   { font-size: 48px; font-weight: 800; margin-top: 6px; }
    .result-pass .result-score  { color: var(--success); }
    .result-fail .result-score  { color: var(--warn); }

    /* ── Answer feedback ── */
    .fb-block {
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 8px;
      border-left: 4px solid;
      font-size: 14px;
    }
    .fb-ok   { background: #f1f8ee; border-color: var(--success); }
    .fb-fail { background: #fdf3f2; border-color: var(--warn); }
    .fb-block p { margin-bottom: 5px; line-height: 1.5; }
    .fb-q    { font-weight: 600; }
    .fb-verdict { font-weight: 700; margin-top: 6px; margin-bottom: 0; }

    /* ── Lists (quiz picker) ── */
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      gap: 12px;
      margin-bottom: 6px;
    }

    /* ── Utilities ── */
    .muted       { color: var(--muted); }
    .small       { font-size: 12px; }
    .pass        { color: var(--success); font-weight: 600; }
    .fail        { color: var(--warn);    font-weight: 600; }
    .loading-msg { padding: 20px; }
    .error {
      color: var(--warn);
      background: #fde7e9;
      padding: 14px 16px;
      border-radius: 8px;
      line-height: 1.6;
    }

    /* ── Profile card (auto-detected user) ── */
    .profile-card {
      padding: 24px 28px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f0f6ff;
      border-left: 4px solid var(--primary);
    }
    .profile-welcome {
      font-size: 22px;
      margin-bottom: 16px;
      color: var(--text);
    }
    .profile-rows { display: flex; flex-direction: column; gap: 8px; }
    .profile-row  { display: flex; align-items: center; gap: 12px; }
    .profile-lbl  {
      width: 110px;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--muted);
    }
    .profile-row > span:last-child { font-size: 14px; font-weight: 500; }
    .btn-ghost {
      background: #f3f2f1;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: #e8e6e4; filter: none; }

    /* ── Guided selector (manual name picker) ── */
    .profile-form {
      padding: 24px 28px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #faf9f8;
    }
    .profile-form-title { font-size: 20px; color: var(--primary); margin: 0 0 6px; }
    .profile-form .profile-row { margin-bottom: 10px; }
    .profile-form select {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      background: #fff;
      outline: none;
    }
    .profile-form select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0,120,212,.12); }

    @media (max-width: 600px) {
      body { padding: 10px; }
      #agent-root { padding: 16px; }
      .agent-hdr h2 { font-size: 20px; }
      .result-score { font-size: 38px; }
      .profile-card, .profile-form { padding: 16px; }
      .profile-lbl { width: 80px; }
    }
  </style>
</head>
<body>

  <div id="agent-root">
    <p class="muted loading-msg">Loading…</p>
  </div>

  <script src="quiz.js"></script>

</body>
</html>
